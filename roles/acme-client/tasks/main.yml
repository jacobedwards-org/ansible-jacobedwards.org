- name: Install Lets Encrypt private key
  ansible.builtin.copy:
    src: "{{ acmeclient_authority_keyfile }}"
    dest: "/etc/acme/{{ acmeclient_authority_keyfile | basename }}"
    owner: root
    group: wheel
    mode: 0400
  notify: update certificates
  tags: [config]

- name: Install acme-client.conf
  ansible.builtin.template:
    src: acme-client.conf.j2
    dest: /etc/acme-client.conf
    owner: root
    group: wheel
    mode: 0644
  notify: update certificates
  tags: [config]
